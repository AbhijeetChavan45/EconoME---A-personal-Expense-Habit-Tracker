<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EconoME Signup</title>

<link rel="stylesheet" href="../CSS/base.css">
<link rel="stylesheet" href="../CSS/login.css">

<link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Text:wght@200..700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@100..900&display=swap" rel="stylesheet">

</head>

<body>

<div class="login-wrapper">

<div class="login-container">

<h2>Econo<span>ME</span></h2>
<p class="subtext">Create your account</p>

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

<div class="password-group">
<input type="password" id="password" placeholder="Password">
<span id="togglePassword">👁</span>
</div>

<button id="signupBtn">Create Account</button>

<p class="auth-link">
Already have an account?
<a href="../HTML/login.html">Login</a>
</p>

<p id="errorMsg"></p>

</div>

</div>

<script type="module" src="../JavaScript/signup.js"></script>

</body>
</html>
